# SearXNG Configuration
# See: https://docs.searxng.org/admin/settings/index.html

use_default_settings: true

general:
  instance_name: "SearXNG MCP"
  debug: false

search:
  safe_search: 0
  autocomplete: "duckduckgo"
  default_lang: "en"
  formats:
    - html
    - json

server:
  # IMPORTANT: Change this to a unique random string before deploying.
  # Generate one with: python3 -c "import secrets; print(secrets.token_hex(32))"
  secret_key: "CHANGE_ME_TO_A_RANDOM_SECRET"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false
  image_proxy: true

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false

  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false

  - name: bing
    engine: bing
    shortcut: b
    disabled: false

  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false

  - name: github
    engine: github
    shortcut: gh
    disabled: false
